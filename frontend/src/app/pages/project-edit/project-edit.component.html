<div class="container">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="loading-state">
    <div class="loading-spinner"></div>
    <p>Chargement du projet...</p>
  </div>

  <!-- Error State -->
  <div *ngIf="error" class="alert alert-error">
    {{ error }}
    <button (click)="loadProject()" class="btn btn-primary btn-small">Réessayer</button>
  </div>

  <!-- Edit Form -->
  <div *ngIf="!isLoading && !error && project">
    <h1>Modifier le projet</h1>

    <form (ngSubmit)="onSubmit()" #editForm="ngForm" class="edit-form">
      <div class="form-group">
        <label for="name">Nom du projet</label>
        <input id="name" type="text" name="name" [(ngModel)]="project.name" placeholder="Nom du projet" required
          #name="ngModel" [class.invalid]="name.invalid && name.touched">
        <div *ngIf="name.invalid && name.touched" class="error-message">
          Le nom du projet est requis
        </div>
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" [(ngModel)]="project.description"
          placeholder="Description du projet" rows="5" #description="ngModel"></textarea>
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="!editForm.form.valid || isSaving" class="btn btn-primary">
          <span *ngIf="!isSaving">Enregistrer</span>
          <span *ngIf="isSaving">Enregistrement...</span>
        </button>

        <a [routerLink]="['/projects', projectId]" class="btn btn-secondary">
          Annuler
        </a>
      </div>
    </form>

    <div *ngIf="saveError" class="alert alert-error">
      {{ saveError }}
    </div>
  </div>
</div>
